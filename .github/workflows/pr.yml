name: Pull request

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Prepare
        env:
          PEN_FILE_SERVER: ${{secrets.PEN_FILE_SERVER}}
        run: |
          .github/bin/prepare.sh
          .github/bin/ftp_tool.sh -g
          sudo tar xf googletest.tar.gz -C /usr/local/

      - name: Build
        run: .github/bin/build_dev.sh

      - name: Run tests
        run: make check

